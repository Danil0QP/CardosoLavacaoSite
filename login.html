<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" href="/imagens/icone-Logo-32.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="logo-empresa"><img src="imagens/LogoCardosoCorrigido.png" alt="Logo empresa"></div>
    <div class="texto-login">
        <h1>Olá seja bem-vindo novamente!</h1>
        <p>Acessar conta</p>
        <p>CPF:</p>
        <input type="text" id="login-cpf" placeholder="Ex: 123.456.789-00">
        <p>Senha:</p>
        <input type="password" id="login-senha" placeholder="Insira sua senha aqui.">
        <button id="botao-acesso" onclick="validar()">Acessar</button>
        <p>Não possui uma conta? <a href="/cadastrar.html">Criar conta</a></p>
    </div>
</body>


<script src="js/login.js" defer></script>
</html>
