<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamentos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/agendamento.css">
    <link rel="stylesheet" href="css/header.css">
</head>

<body>
    <div id="header"></div>
    <main class="container py-4">
        <div class="agendamento-filtros card p-3 mb-3">
            <div class="row g-2 align-items-end">
                <div class="col-12 col-md-8">
                    <label class="form-label" for="filtro-cliente">Buscar por cliente</label>
                    <input id="filtro-cliente" type="text" class="form-control" placeholder="Digite o nome do cliente.">
                </div>
                <div class="col-12 col-md-4 d-grid d-md-flex gap-2 justify-content-md-end">
                    <button id="btn-limpar-filtro" class="btn btn-outline-light" type="button">Limpar</button>
                    <button id="btn-atualizar" class="btn btn-primary" type="button">Atualizar</button>
                </div>
                <small id="resumo-lista" class="text-light mt-2"></small>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table table-dark table-striped align-middle text-center">
                <thead>
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">Cliente</th>
                        <th scope="col">Data</th>
                        <th scope="col">Hora</th>
                        <th scope="col">Serviço</th>
                        <th scope="col">Status</th>
                        <th scope="col">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-agendamento"></tbody>
            </table>
        </div>
    </main>




    <script src="js/include.js"></script>
    <script src="js/agendamento.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
