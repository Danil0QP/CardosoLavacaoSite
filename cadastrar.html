<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="icon" href="/imagens/icone-Logo-32.ico" type="image/x-icon">

    <link rel="stylesheet" href="css/cadastrar.css">
</head>

<body>
    <div class="logo-empresa"><img src="imagens/LogoCardosoCorrigido.png" alt="Logo empresa"></div>
    <form id="form-cadastro">
        <div class="cadastro">
            <h1>Seja bem-vindo</h1>
            <h2>Criar cadastro!</h2>
            <p>Nome:</p>
            <input type="text" id="cadastro-nome" placeholder="Ex: Seu nome completo">
            <p>Data de Nascimento</p>
            <input type="date" id="cadastro-data-nascimento" placeholder="Ex: DD/MM/AAAA">
            <p>Número de Telefone:</p>
            <input type="number" id="cadastro-telefone" placeholder="Ex: (48)9 9999-9999">
            <p>CPF:</p>
            <input type="text" id="cadastro-cpf" maxlength="14" placeholder="Ex: 123.456.789-00">
            <small id="erro-cpf" style="color: red; display: none;"></small>
            <p>Marca:</p>
            <input type="text" id="cadastro-marca-carro" placeholder="Ex: Adicione a marca do carro">
            <p>Carro:</p>
            <input type="text" id="cadastro-nome-carro" placeholder="Ex: Adicione o nome do carro">
            <div class="switch-mercosul" id="placa">
                <span>Mercosul:</span>
                <label class="switch">
                    <input type="checkbox" id="switch-placa">
                    <span class="slider"></span>
                </label>
            </div>
            <p>Placa:</p>
            <input type="text" id="cadastro-placa-do-carro" aria-describedby="erro-placa">
            <small id="erro-placa" style="color:red; display: none;"></small>
            <p>Senha:</p>
            <input type="password" id="cadastro-senha" placeholder="Insira sua senha aqui." autocomplete="new-password"
                required minlength="8">
            <small id="erro-senha" style="color: red; display: none;"></small>
            <p>Confirmar sua senha</p>
            <input type="password" id="confirma-senha" placeholder="Insira a senha novamente.">
            <small id="erro-confirma-senha" style="color: red; display: none;"></small>
            <button type="submit" id="botao-acesso">Criar</button>
            <p class="acessar-conta">Já possui uma conta? <a href="/login.html">Acessar conta</a></p>
        </div>

        <span id="erro-geral" style="color: red;"></span>
    </form>
</body>


<script src="js/cadastrar.js" defer></script>

</html>
