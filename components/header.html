<header class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/index.html">
            <h1>Cardoso Lavação</h1>
        </a>
        <button type="button" class="btn btn-primary" data-bs-toggle="modal"
            data-bs-target="#AcessarLogin">Acessar</button>
        <a href="#"><i class="bi bi-box-arrow-right" title="Sair"></i></a>
    </div>

    <div class="modal fade" id="AcessarLogin" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Login de Acesso</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <h5>CPF:</h5>
                    <input type="text" id="cpf" placeholder="EX: 000.000.000-00">
                    <h5>Senha:</h5>
                    <input type="password" placeholder="Insira sua senha.">
                    <p>Não possui cadastro? -><a href="#">Criar conta</a></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-success"
                        onclick="window.location.href='index.html'">Salvar</button>
                </div>
            </div>
        </div>
    </div>
</header>
